      <stop offset="0%" stop-color="#9b33f0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#9b33f0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9b33f0" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow wider -->
