      <stop offset="0%" stop-color="#7a00df" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#5e00ab" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5e00ab" stop-opacity="0"/>
