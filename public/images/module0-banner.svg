      <stop offset="0%" stop-color="#9b33f0"/>
      <stop offset="50%" stop-color="#7a00df"/>
      <stop offset="100%" stop-color="#0693e3"/>
    </linearGradient>

    <!-- Radial glow for lightbulb -->
